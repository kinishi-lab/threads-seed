<!-- localStorage 互換シム： .jsx は window.storage（get/set/delete/list）前提なので localStorage にマッピング -->
<script>
(function(){
  function rec(key, value){ return { key: key, value: value }; }
  window.storage = {
    get: function(key){ return Promise.resolve().then(function(){
      var v = localStorage.getItem(key); return (v === null) ? null : rec(key, v); }); },
    set: function(key, value){ return Promise.resolve().then(function(){
      localStorage.setItem(key, value); return rec(key, value); }); },
    "delete": function(key){ return Promise.resolve().then(function(){
      localStorage.removeItem(key); return { key: key, deleted: true }; }); },
    list: function(prefix){ return Promise.resolve().then(function(){
      var keys = [];
      for (var i = 0; i < localStorage.length; i++){
        var k = localStorage.key(i);
        if (!prefix || (k && k.indexOf(prefix) === 0)) keys.push(k);
      }
      return { keys: keys };
    }); }
  };
})();
</script>
